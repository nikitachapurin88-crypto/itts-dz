<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorting Visualizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Sorting Visualizer</h1>
      <p class="subtitle">Визуализация алгоритмов сортировки</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label>Алгоритм</label>
        <select id="algo">
          <option value="bubble">Bubble sort</option>
          <option value="insertion">Insertion sort</option>
          <option value="selection">Selection sort</option>
          <option value="quick">Quick sort</option>
          <option value="merge">Merge sort</option>
          <option value="shell">Shell sort</option>
	  <option value="heap">Heap sort</option>
        </select>
      </div>

      <div class="control-group">
        <label>Массив</label>
        <select id="mode">
          <option value="random">Случайный</option>
          <option value="reversed">Обратный</option>
          <option value="nearly">Почти отсортированный</option>
        </select>
      </div>

      <div class="control-group">
        <label>Размер: <span id="sizeOut">40</span></label>
        <input type="range" id="sizeSlider" min="10" max="100" value="40" step="1">
      </div>

      <div class="control-group">
        <label>Скорость: <span id="speedOut">5</span></label>
        <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
      </div>

      <div class="buttons">
        <button id="randomBtn" class="btn">↺ Новый массив</button>
        <button id="startBtn" class="btn btn-primary">▶ Старт</button>
        <button id="stopBtn" class="btn" disabled>■ Стоп</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Сравнения</div>
        <div class="stat-value" id="cmpCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Свапы</div>
        <div class="stat-value" id="swapCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Шаги</div>
        <div class="stat-value" id="stepCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Всего шагов</div>
        <div class="stat-value" id="totalSteps">—</div>
      </div>
    </div>

    <div class="viz-container">
      <div class="bars" id="bars"></div>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="dot dot-default"></span> обычный</span>
      <span class="legend-item"><span class="dot dot-cmp"></span> сравнение</span>
      <span class="legend-item"><span class="dot dot-swap"></span> свап</span>
      <span class="legend-item"><span class="dot dot-done"></span> готово</span>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
